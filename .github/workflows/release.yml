name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token is stored anywhere.
# Fires when a GitHub Release is published; also runnable manually.
# PyPI side: register a Trusted Publisher on the `dongnae` project with
#   owner=nash-dir, repo=dongnae, workflow=release.yml, environment=pypi.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (py-core)
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist ./py-core
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
